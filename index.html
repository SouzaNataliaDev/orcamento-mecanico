<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#116a5b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Orcamento Mecanico" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Crie orcamentos de oficina em menos de 1 minuto." />
    <title>Orcamento Mecanico</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <button class="icon-button" id="menuButton" type="button" aria-label="Abrir menu">☰</button>
        <div>
          <p class="eyebrow">Oficina</p>
          <h1 id="screenTitle">Orcamentos</h1>
        </div>
        <button class="icon-button" id="searchButton" type="button" aria-label="Pesquisar">⌕</button>
      </header>

      <section class="search-panel" id="searchPanel" hidden>
        <label>
          Buscar por cliente, O.S ou placa
          <input id="searchInput" type="search" inputmode="search" placeholder="Ex: Joao, 12 ou ABC1D23" />
        </label>
      </section>

      <main class="screen">
        <section class="view active" id="homeView" aria-label="Lista de orcamentos">
          <div class="summary-band">
            <strong id="budgetCount">0</strong>
            <span>orcamentos salvos</span>
            <button class="secondary-button install-button" type="button" id="installButton" hidden>Instalar app</button>
          </div>
          <div class="budget-list" id="budgetList"></div>
          <div class="empty-state" id="emptyState">
            <strong>Nenhum orcamento ainda</strong>
            <span>Toque no + para criar o primeiro.</span>
          </div>
        </section>

        <section class="view" id="plateView" aria-label="Leitura de placa">
          <div class="step-card camera-card">
            <p class="step-label">Passo 1 de 4</p>
            <h2>Ler placa</h2>
            <div class="camera-box">
              <video id="cameraPreview" autoplay muted playsinline></video>
              <div class="plate-frame">ABC1D23</div>
            </div>
            <p class="status-text" id="cameraStatus">Abrindo camera traseira...</p>
            <div class="button-row">
              <button class="secondary-button" type="button" id="manualPlateButton">Manual</button>
              <button class="primary-button" type="button" id="capturePlateButton">Capturar placa</button>
            </div>
          </div>
        </section>

        <section class="view" id="manualPlateView" aria-label="Digitar placa manualmente">
          <div class="step-card">
            <p class="step-label">Passo 1 de 4</p>
            <h2>Digite a placa</h2>
            <label class="big-label">
              Placa
              <input id="manualPlateInput" class="big-input plate-input" maxlength="7" placeholder="ABC1D23" />
            </label>
            <div class="button-row">
              <button class="secondary-button" type="button" data-back="plateView">Voltar</button>
              <button class="primary-button" type="button" id="confirmManualPlateButton">Continuar</button>
            </div>
          </div>
        </section>

        <section class="view" id="vehicleView" aria-label="Confirmar veiculo">
          <div class="step-card">
            <p class="step-label">Passo 2 de 4</p>
            <h2>Confirmar veiculo</h2>
            <div class="form-stack">
              <label>Placa <input id="vehiclePlate" class="plate-input" /></label>
              <label>Modelo <input id="vehicleModel" /></label>
              <label>Ano <input id="vehicleYear" inputmode="numeric" /></label>
              <label>Cor <input id="vehicleColor" /></label>
            </div>
            <div class="button-row">
              <button class="secondary-button" type="button" data-back="manualPlateView">Voltar</button>
              <button class="primary-button" type="button" id="vehicleContinueButton">Continuar</button>
            </div>
          </div>
        </section>

        <section class="view" id="clientView" aria-label="Dados do cliente">
          <div class="step-card">
            <p class="step-label" id="clientStepLabel">Passo 3 de 4</p>
            <h2 id="clientStepTitle">Nome do cliente</h2>
            <label class="big-label">
              <span id="clientFieldLabel">Nome</span>
              <input id="clientStepInput" class="big-input" autocomplete="off" />
            </label>
            <div class="button-row">
              <button class="secondary-button" type="button" id="clientBackButton">Voltar</button>
              <button class="primary-button" type="button" id="clientNextButton">Proximo</button>
            </div>
          </div>
        </section>

        <section class="view" id="budgetTextView" aria-label="Orcamento por texto">
          <div class="step-card wide-card">
            <p class="step-label">Passo 4 de 4</p>
            <h2>Diga o orcamento e valor</h2>
            <textarea id="budgetTextInput" class="budget-text" rows="8" placeholder="alinhamento e balanceamento - 30 reais&#10;troca de 2 pneus dianteiros - 60 reais&#10;mao de obra - 130&#10;aplica desconto de 10%"></textarea>
            <div class="parsed-preview" id="parsedPreview"></div>
            <div class="button-row">
              <button class="secondary-button" type="button" data-back="clientView">Voltar</button>
              <button class="primary-button" type="button" id="finishBudgetButton">Gerar orcamento</button>
            </div>
          </div>
        </section>

        <section class="view" id="detailView" aria-label="Resumo do orcamento">
          <div class="detail-card" id="detailCard"></div>
        </section>
      </main>

      <button class="fab" id="newBudgetButton" type="button" aria-label="Novo orcamento">+</button>
    </div>

    <aside class="drawer" id="drawer" aria-label="Menu lateral" aria-hidden="true">
      <div class="drawer-header">
        <strong>Menu</strong>
        <button class="icon-button" id="closeMenuButton" type="button" aria-label="Fechar menu">×</button>
      </div>
      <button type="button">Configuracoes</button>
      <button type="button">Dados da oficina</button>
      <button type="button">Modelo do PDF</button>
      <button type="button">Deslogar</button>
    </aside>
    <div class="overlay" id="overlay" hidden></div>

    <script src="script.js"></script>
  </body>
</html>
